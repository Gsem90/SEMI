<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — SEMI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="nav-logo">
      <img src="Semi_white_transparent.png" alt="SEMI">
    </div>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#app">App</a></li>
      <li><a href="index.html#apparel">Apparel</a></li>
      <li><a href="index.html#waitlist">Join Waitlist</a></li>
    </ul>
  </nav>

  <section class="waitlist" style="min-height: 100vh;">
    <h2>Contact <em>SEMI.</em></h2>
    <p>Questions, feedback, or just want to talk training? We're here.</p>
    <form class="waitlist-form" action="https://formspree.io/f/mgondbqg" method="POST">
      <input type="text" name="name" placeholder="Your name" required />
      <input type="email" name="email" placeholder="Your email address" required />
      <textarea name="message" placeholder="Your message" rows="4" required></textarea>
      <button type="submit">Send</button>
    </form>
    <p class="waitlist-note">No spam. Ever. Just SEMI.</p>
  </section>
</body>
</html>
